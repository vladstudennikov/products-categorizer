<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Intelligence Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>Strategic<span>Intelligence</span></h1>
            </div>
            <p class="subtitle">AI-Powered Market & Assortment Analysis</p>
        </header>

        <main>
            <section class="controls">
                <button id="analyze-btn" class="btn primary">Generate Strategic Analysis</button>
                <button id="export-btn" class="btn secondary" disabled>Export Report (.md)</button>
            </section>

            <section id="loading" class="hidden">
                <div class="loader-container">
                    <div class="spinner"></div>
                    <p>Agent is analyzing market clusters and sales data...<br><small>This may take up to a minute (multiple AI agents involved)</small></p>
                </div>
            </section>

            <section id="results" class="result-card hidden">
                <div id="report-content" class="markdown-body">
                    <!-- AI Report will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Multiagent Strategy System. By Studennykov Vlad</p>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
